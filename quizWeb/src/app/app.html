<!-- Guest Navbar -->
<nz-header *ngIf="!isUserLoggedIn && !isAdminLoggedIn"
           class="main-header"
           nz-row nzType="flex"
           style="background-color:#003973;">
  <div>
    <a style="color: white;margin-left:50px;font-size:18px;font-weight:bolder;"
       routerLink="/login">
      Quiz App
    </a>
  </div>

  <div class="nav-links">
    <a nz-button nzType="link" routerLink="/register">Signup</a>
    <a nz-button nzType="link" routerLink="/login">Login</a>
  </div>
</nz-header>

<!-- Admin Navbar -->
<nz-header *ngIf="isAdminLoggedIn"
           class="main-header"
           nz-row nzType="flex"
           style="background-color:#003973;">
  <div>
    <a style="color: white;margin-left:50px;font-size:18px;font-weight:bolder;"
       routerLink="/admin/dashboard">
      Quiz App
    </a>
  </div>

  <div class="nav-links">
    <a nz-button nzType="link" routerLink="/admin/dashboard">Dashboard</a>
    <a nz-button nzType="link" routerLink="/admin/create-test">Create Test</a>
    <a nz-button nzType="link" routerLink="/admin/add-question">Add Question</a>
    <a nz-button nzType="link" (click)="logout()">Logout</a>
  </div>
</nz-header>

<!-- User Navbar -->
<nz-header *ngIf="isUserLoggedIn && !isAdminLoggedIn"
           class="main-header"
           nz-row nzType="flex"
           style="background-color:#003973;">
  <div>
    <a style="color: white;margin-left:50px;font-size:18px;font-weight:bolder;"
       routerLink="/user/dashboard">
      Quiz App
    </a>
  </div>

  <div class="nav-links">
    <a nz-button nzType="link" routerLink="/user/dashboard">Dashboard</a>
    <a nz-button nzType="link" (click)="logout()">Logout</a>
  </div>
</nz-header>

<router-outlet></router-outlet>
