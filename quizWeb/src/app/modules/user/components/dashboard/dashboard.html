<div style="max-width: 800px; margin: 40px auto; font-family: Arial;">

  <h2>Available Tests</h2>

  <div *ngIf="tests.length === 0" style="color: gray;">
    No tests available yet.
  </div>

  <div *ngFor="let test of tests"
    style="border: 1px solid #d9d9d9; border-radius: 8px; padding: 20px; margin-bottom: 16px;">

    <h3 style="margin: 0 0 8px 0;">{{ test.title }}</h3>
    <p style="color: gray; margin: 0 0 8px 0;">{{ test.description }}</p>
    <p style="margin: 0 0 12px 0;">⏱ {{ test.timeLimit / 60 | number:'1.0-0' }} minutes total</p>

    <button (click)="startTest(test.id)"
      style="background: #1890ff; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer;">
      Start Test
    </button>

  </div>

</div>
